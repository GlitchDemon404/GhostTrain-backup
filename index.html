<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Ghost Train</title>

    <link rel="icon" href="sj.png">
    <link rel="stylesheet" href="index.css">

    <script src="/active/uv/uv.bundle.js"></script>
    <script src="/active/uv/uv.config.js"></script>
    <script src="/register-sw.js"></script>
</head>

<body>

    <div class="logo-wrapper" style="text-align:center;">
        <img src="sj.png" style="width:150px; filter:drop-shadow(0 0 15px #00ff88);">
        <h1 style="font-family:monospace; font-size:70px; text-shadow:0 0 20px #00ff88;">
            GHOST TRAIN
        </h1>
    </div>

    <form id="uv-form" style="text-align:center; margin-top:30px;">
        <input id="uv-address" type="text" placeholder="Travel anywhere..." 
            style="width:60%; padding:15px; font-size:18px;">
    </form>

    <p id="uv-error" style="text-align:center; color:red;"></p>

    <script>
        const form = document.getElementById("uv-form");
        const input = document.getElementById("uv-address");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            let url = input.value.trim();
            if (!url) return;

            try {
                if (!url.startsWith("http://") && !url.startsWith("https://")) {
                    url = "https://" + url;
                }

                new URL(url);
            } catch {
                url = "https://duckduckgo.com/?q=" + encodeURIComponent(url);
            }

            await navigator.serviceWorker.register("/uv-sw.js", {
                scope: __uv$config.prefix
            });

            window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
        });
    </script>

</body>

</html>
